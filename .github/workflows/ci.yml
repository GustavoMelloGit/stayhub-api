name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run type check
        run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stayhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/stayhub_test
          NODE_ENV=test
          JWT_SECRET=ci-test-secret
          PORT=3001
          TUYA_DEVICE_ID=dummy
          TUYA_CLIENT_ID=dummy
          TUYA_CLIENT_SECRET=dummy
          EOF

      - name: Push schema to test database
        run: bun --env-file=.env.test x drizzle-kit push --force

      - name: Run tests
        run: bun test --env-file=.env.test --preload ./tests/setup.ts
