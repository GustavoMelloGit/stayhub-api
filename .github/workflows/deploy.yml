name: Deploy API na VPS

on:
  push:
    branches:
      - main

# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST, VPS_USERNAME, VPS_PORT, SSH_PRIVATE_KEY, VPS_RUNNER_USERNAME
#   PORT, DATABASE_URL, NODE_ENV, JWT_SECRET
#   TUYA_DEVICE_ID, TUYA_CLIENT_ID, TUYA_CLIENT_SECRET
#
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Montar .env a partir dos Secrets
        run: |
          set -euo pipefail
          NODE_ENV="${NODE_ENV:-production}"
          {
            printf "PORT=%s\n" "${PORT}"
            printf "DATABASE_URL=%s\n" "${DATABASE_URL}"
            printf "NODE_ENV=%s\n" "${NODE_ENV}"
            printf "JWT_SECRET=%s\n" "${JWT_SECRET}"
            printf "TUYA_DEVICE_ID=%s\n" "${TUYA_DEVICE_ID}"
            printf "TUYA_CLIENT_ID=%s\n" "${TUYA_CLIENT_ID}"
            printf "TUYA_CLIENT_SECRET=%s\n" "${TUYA_CLIENT_SECRET}"
          } > .env.deploy
          echo "DOTENV_B64=$(base64 -w0 < .env.deploy)" >> "${GITHUB_ENV}"
        env:
          PORT: ${{ secrets.PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TUYA_DEVICE_ID: ${{ secrets.TUYA_DEVICE_ID }}
          TUYA_CLIENT_ID: ${{ secrets.TUYA_CLIENT_ID }}
          TUYA_CLIENT_SECRET: ${{ secrets.TUYA_CLIENT_SECRET }}

      - name: Executar Deploy Remoto via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOTENV_B64: ${{ env.DOTENV_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOTENV_B64
          script: |
            set -euo pipefail
            RUNNER_USER="${{ secrets.VPS_RUNNER_USERNAME }}"
            APP_DIR="/home/${RUNNER_USER}/stayhub_api"
            umask 077
            echo "${DOTENV_B64}" | base64 -d > "${APP_DIR}/.env"
            chown "${RUNNER_USER}:${RUNNER_USER}" "${APP_DIR}/.env"
            chmod 600 "${APP_DIR}/.env"
            sudo -i -u "${RUNNER_USER}" /bin/bash << 'EOF'
            cd stayhub_api
            git pull
            /home/${{ secrets.VPS_RUNNER_USERNAME }}/.bun/bin/bun install
            /home/${{ secrets.VPS_RUNNER_USERNAME }}/.bun/bin/bun run db:push
            pm2 restart stayhub_api
            EOF
